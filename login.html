<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PadelPro Manager - Inicio de Sesión</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#59f20d",
                        "surface": "#121d0d",
                        "background": "#0a1208",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(18, 29, 13, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(89, 242, 13, 0.15);
        }
        .toast { position: fixed; top: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 1rem; color: white; font-weight: 700; transform: translateX(120%); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 9999; }
        .toast.show { transform: translateX(0); }
        .toast-success { background: #59f20d; color: #0a1208; }
        .toast-error { background: #ef4444; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>

<body class="bg-background text-slate-100 font-sans flex items-center justify-center min-h-screen p-6">
    <div id="toast" class="toast"></div>
    <!-- Main Login Card Container -->
    <div class="w-full max-w-lg" id="login-card">
        <!-- Brand/Logo Section -->
        <div class="flex flex-col items-center mb-10 group">
            <div
                class="size-16 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/20 transition-transform group-hover:scale-105 duration-300">
                <span class="material-symbols-outlined text-background-dark text-4xl">sports_tennis</span>
            </div>
            <h1 class="text-4xl font-black mt-6 tracking-tight">PadelPro <span class="text-primary italic">Manager</span>
            </h1>
            <p class="text-slate-500 mt-2 font-medium opacity-80">Bienvenido de nuevo, Administrador</p>
        </div>
        <!-- Form Container -->
        <div class="glass-card rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden">
            <!-- Decorative Glow -->
            <div
                class="absolute -top-24 -right-24 size-48 bg-primary/10 rounded-full blur-3xl group-hover:bg-primary/20 transition-all">
            </div>
            <!-- Login Form -->
            <form id="login-form" class="space-y-6">
                <!-- Username/Email Field -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Correo o Usuario</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-xl">person</span>
                        <input name="username"
                            class="w-full bg-white/5 border border-primary/20 rounded-lg py-4 pl-12 pr-4 text-white placeholder:text-slate-500 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none"
                            placeholder="Introduce tu Usuario" type="text" required />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Contraseña</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-xl">lock</span>
                        <input name="password" id="password-field"
                            class="w-full bg-white/5 border border-primary/20 rounded-lg py-4 pl-12 pr-12 text-white placeholder:text-slate-500 focus:border-primary focus:ring-1 focus:ring-primary transition-all outline-none"
                            placeholder="••••••••" type="password" required />
                        <button class="absolute right-4 top-1/2 -translate-y-1/2 text-primary/60 hover:text-primary"
                            type="button" onclick="togglePassword()">
                            <span class="material-symbols-outlined text-xl" id="eye-icon">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Utilities -->
                <div class="flex items-center justify-between py-2">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <div class="relative flex items-center">
                            <input
                                class="peer h-5 w-5 rounded border-primary/30 bg-background-dark text-primary focus:ring-primary focus:ring-offset-background-dark"
                                type="checkbox" />
                        </div>
                        <span class="text-sm text-slate-300 group-hover:text-primary transition-colors">Recordarme</span>
                    </label>
                    <a class="text-sm font-semibold text-primary hover:text-white transition-colors underline-offset-4 hover:underline"
                        href="#">¿Olvidaste tu contraseña?</a>
                </div>
                <!-- Submit Button -->
                <button
                    class="w-full bg-primary hover:bg-primary/90 text-[#0a1208] font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group"
                    type="submit">
                    <span>Iniciar Sesión</span>
                    <span
                        class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
                </button>
            </form>
            <!-- Footer Section -->
            <div class="mt-10 pt-6 border-t border-primary/10 text-center">
                <p class="text-slate-400 text-sm">
                    ¿No tienes una cuenta?
                    <a class="text-primary font-bold hover:underline" href="registro.html">Crear Cuenta</a>
                </p>
            </div>
        </div>
        <!-- Support Links -->
        <div class="mt-8 flex justify-center gap-6 text-xs font-bold uppercase tracking-widest text-slate-500">
            <a class="hover:text-primary transition-colors" href="#">Centro de Ayuda</a>
            <a class="hover:text-primary transition-colors" href="#">Política de Privacidad</a>
            <a class="hover:text-primary transition-colors" href="#">Términos de Servicio</a>
        </div>
    </div>
    <script>
        // --- SISTEMA DE NOTIFICACIONES PROFESIONALES (TIPO TOAST) ---
        function showNotification(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show toast-${type}`;
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        // --- MANEJADOR DE AUTENTICACIÓN AJAX ---
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const card = document.getElementById('login-card');
            const formData = new FormData(this);

            fetch('validacion_login.php', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showNotification('¡Acceso concedido! Redirigiendo...', 'success');
                    setTimeout(() => { window.location.href = data.redirect; }, 1000);
                } else {
                    showNotification(data.message, 'error');
                    card.classList.add('shake');
                    setTimeout(() => { card.classList.remove('shake'); }, 500);
                }
            })
            .catch(err => {
                showNotification('Error de conexión con el servidor.', 'error');
            });
        });

        // --- FUNCIÓN DE VER CONTRASEÑA ---
        function togglePassword() {
            const field = document.getElementById('password-field');
            const icon = document.getElementById('eye-icon');
            if (field.type === 'password') {
                field.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                field.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body>

</html>
