<body class="bg-background text-on-background font-body min-h-screen selection:bg-primary selection:text-on-primary">
    <!-- Suppressed Navigation Shell as per Linear/Transactional Rule -->
    <main class="relative min-h-screen flex items-center justify-center p-4 md:p-8 overflow-hidden">
        <!-- Background Image with Environmental Depth -->
        <div class="absolute inset-0 z-0">
            <img alt="Padel court at night with bright stadium lighting" class="w-full h-full object-cover opacity-40"
                data-alt="Professional padel court at night with green neon lights"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgzE7N5cvfTuKBalyDH5WU8d_TqmicxgzbuGPeENANbopKvJvMLcRuR7aWtNiwzi13lUJnpspWpOi3_pQjqVNcTapOTYVydw4w7TWge1y7wNueOdCe3GHsXTN4juIbrXXvb71F_XLs6_i4l6ttBh9W58FRkTqmEBSmlGYThOtcSscIiXrwxLFEThqBwfZDPUTD56jjxvRxC6JP1eWkuQWZ6m2ZVRcHL6xwjKNWmbg6gNsnDQfrIBBCL47SrgBpoYb-y2FSK9zklyQ" />
            <div class="absolute inset-0 bg-gradient-to-t from-background via-background/60 to-transparent"></div>
        </div>
        <!-- Registration Container -->
        <div class="relative z-10 w-full max-w-2xl">
            <div class="glass-panel p-8 md:p-12 rounded-xl shadow-lg shadow-primary/10">
                <!-- Header Section -->
                <div class="mb-10 text-center">
                    <div
                        class="inline-flex items-center justify-center p-3 mb-6 bg-primary/10 rounded-xl border border-primary/20">
                        <span class="material-symbols-outlined text-primary text-3xl"
                            data-icon="sports_tennis">sports_tennis</span>
                    </div>
                    <h1 class="font-headline text-3xl md:text-4xl font-black text-on-background tracking-tight mb-3">
                        Create your Player Profile
                    </h1>
                    <p class="text-on-surface-variant text-sm md:text-base max-w-md mx-auto">
                        Join the PadelPro community and start booking courts in seconds.
                    </p>
                </div>
                <!-- Registration Form -->
                <form action="validacion_registro.php" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Full Name -->
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Full
                            Name</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="person">person</span>
                            <input name="username"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="John Doe" type="text" required />
                        </div>
                    </div>
                    <!-- Cédula (ID) -->
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Cédula
                            (ID)</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="badge">badge</span>
                            <input name="cedula"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="0-0000-0000" type="text" required />
                        </div>
                    </div>
                    <!-- Email -->
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Email</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="mail">mail</span>
                            <input name="email"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="johndoe@email.com" type="email" required />
                        </div>
                    </div>
                    <!-- Phone -->
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Phone</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="call">call</span>
                            <input name="telefono"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="+506 0000-0000" type="tel" required />
                        </div>
                    </div>
                    <!-- Password -->
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Password</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="lock">lock</span>
                            <input name="password"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                    <!-- Confirm Password -->
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Confirm
                            Password</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="verified_user">verified_user</span>
                            <input name="confirm_password"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                    <!-- Submit Button -->
                    <div class="md:col-span-2 pt-4">
                        <button
                            class="w-full bg-primary text-on-primary font-headline font-black text-lg py-4 rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 shadow-lg shadow-primary/20 hover:shadow-primary/40 uppercase tracking-tighter"
                            type="submit">
                            Create Account
                        </button>
                    </div>
                    <!-- Footer Links -->
                    <div class="md:col-span-2 text-center pt-2">
                        <p class="text-on-surface-variant text-sm">
                            Already have an account?
                            <a class="text-primary font-bold hover:underline transition-all ml-1" href="login.html">Sign In</a>
                        </p>
                    </div>
                </form>
            </div>
            <!-- Minimal Brand Anchor -->
            <div class="mt-8 text-center flex items-center justify-center gap-2">
                <span class="w-8 h-[1px] bg-primary/20"></span>
                <span class="font-headline font-black uppercase text-primary tracking-widest text-xs">PadelPro
                    Manager</span>
                <span class="w-8 h-[1px] bg-primary/20"></span>
            </div>

        <div class="fixed bottom-20 -right-20 w-80 h-80 bg-primary/5 rounded-full blur-[120px] pointer-events-none">
        </div>
    </main>
