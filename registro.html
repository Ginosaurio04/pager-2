<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PadelPro Manager - Admin Registration</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#59f20d",
                        "on-primary": "#162210",
                        "surface": "#162210",
                        "on-surface": "#f6f8f5",
                        "on-surface-variant": "#94a3b8",
                        "surface-container-lowest": "#0a1106",
                        "surface-container-low": "#121d0d",
                        "outline": "#334155",
                    },
                    fontFamily: {
                        "display": ["Lexend"],
                        "headline": ["Lexend"]
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "2xl": "2rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .neon-glow {
            box-shadow: 0 0 15px rgba(89, 242, 13, 0.1);
        }

        .neon-glow:focus-within {
            box-shadow: 0 0 25px rgba(89, 242, 13, 0.2);
        }
    </style>
</head>

<body
    class="bg-surface text-on-surface font-display min-h-screen flex items-center justify-center p-6 selection:bg-primary/30 selection:text-primary">
    <!-- Main Registration Shell -->
    <div class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
        <!-- Left Side: Brand & Value Prop (Collapses on small screens) -->
        <div class="lg:col-span-12 flex flex-col items-center">
            <!-- Glassmorphism Card -->
            <div
                class="w-full bg-surface-container-low/40 border border-primary/10 rounded-[2.5rem] p-8 lg:p-12 shadow-2xl backdrop-blur-3xl relative overflow-hidden">
                <!-- Branding Header -->
                <div class="flex flex-col items-center text-center mb-12">
                    <div
                        class="size-20 bg-primary rounded-3xl flex items-center justify-center shadow-lg shadow-primary/25 mb-6 group transition-all duration-500 hover:rotate-12">
                        <span
                            class="material-symbols-outlined text-on-primary text-5xl transition-transform group-hover:scale-110">sports_tennis</span>
                    </div>
                    <h1 class="text-4xl lg:text-5xl font-black tracking-tighter mb-4">
                        Join <span class="text-primary italic">PadelPro</span>
                    </h1>
                    <p class="text-on-surface-variant font-medium max-w-md mx-auto leading-relaxed">
                        Become part of the elite network of club managers. Experience professional administrative tools
                        at your fingertips.
                    </p>
                </div>
                <!-- Registration Form -->
                <form action="validacion_registro.php" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Full Name -->
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Full
                            Name</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="person">person</span>
                            <input name="username"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="John Doe" type="text" required />
                        </div>
                    </div>
                    <!-- Cédula (ID) -->
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Cédula
                            (ID)</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="badge">badge</span>
                            <input name="cedula"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="0-0000-0000" type="text" required />
                        </div>
                    </div>
                    <!-- Email -->
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Email</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="mail">mail</span>
                            <input name="email"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="johndoe@email.com" type="email" required />
                        </div>
                    </div>
                    <!-- Phone -->
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Phone</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="call">call</span>
                            <input name="telefono"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="+506 0000-0000" type="tel" required />
                        </div>
                    </div>
                    <!-- Password -->
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Password</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="lock">lock</span>
                            <input name="password"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                    <!-- Confirm Password -->
                    <div class="space-y-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-primary/80 px-1">Confirm
                            Password</label>
                        <div class="relative group neon-glow">
                            <span
                                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-primary/60 text-xl"
                                data-icon="verified_user">verified_user</span>
                            <input name="confirm_password"
                                class="w-full bg-surface-container-lowest/50 border border-primary/20 rounded-lg py-3 pl-12 pr-4 text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all placeholder:text-slate-600 outline-none"
                                placeholder="••••••••" type="password" required />
                        </div>
                    </div>
                    <!-- Submit Button -->
                    <div class="md:col-span-2 pt-4">
                        <button
                            class="w-full bg-primary text-on-primary font-headline font-black text-lg py-4 rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 shadow-lg shadow-primary/20 hover:shadow-primary/40 uppercase tracking-tighter"
                            type="submit">
                            Create Account
                        </button>
                    </div>
                    <!-- Footer Links -->
                    <div class="md:col-span-2 text-center pt-2">
                        <p class="text-on-surface-variant text-sm">
                            Already have an account?
                            <a class="text-primary font-bold hover:underline transition-all ml-1" href="login.html">Sign In</a>
                        </p>
                    </div>
                </form>
            </div>
            <!-- Minimal Brand Anchor -->
            <div class="mt-8 text-center flex items-center justify-center gap-2">
                <span class="text-on-surface-variant/40 font-bold text-xs uppercase tracking-widest">© 2023
                    PadelPro Management Systems</span>
            </div>
        </div>
    </div>
</body>

</html>
